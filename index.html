<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Fix for React 19/Vite fetch getter issue
      try {
        const originalFetch = window.fetch;
        Object.defineProperty(window, 'fetch', {
          value: originalFetch,
          writable: true,
          configurable: true,
          enumerable: true
        });
      } catch (e) {
        // Ignore if already writable or other error
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script>
      try {
        const originalFetch = window.fetch;
        Object.defineProperty(window, 'fetch', {
          value: originalFetch,
          writable: true,
          configurable: true,
          enumerable: true
        });
      } catch (e) {
        console.error('Failed to make fetch writable:', e);
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
